<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR受付システム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{--bg:#0d0f14;--surface:#161a22;--surface2:#1e2330;--accent:#00e5a0;--danger:#ff4757;--warn:#ffa502;--text:#e8edf5;--text2:#8892a4;--border:rgba(255,255,255,0.08);--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100svh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:13px;font-weight:700;color:var(--accent);}
.logo span{color:var(--text2);font-weight:400;}
.counter{font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:99px;border:1px solid var(--border);}
.counter b{color:var(--accent);}
#camera-wrap{position:relative;width:100%;flex:1 1 auto;overflow:hidden;background:#000;min-height:0;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#scan-canvas{display:none;}
.corners{position:absolute;inset:0;pointer-events:none;}
.corner{position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;}
.c-tl{top:16px;left:16px;border-width:3px 0 0 3px;}
.c-tr{top:16px;right:16px;border-width:3px 3px 0 0;}
.c-bl{bottom:16px;left:16px;border-width:0 0 3px 3px;}
.c-br{bottom:16px;right:16px;border-width:0 3px 3px 0;}
#debug{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,.75);color:#0f0;font-size:11px;font-family:monospace;padding:6px 8px;border-radius:6px;pointer-events:none;z-index:15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#start-overlay{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:10;}
#start-btn{background:var(--accent);color:#0d0f14;border:none;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;padding:18px 48px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#qr-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:20;padding:24px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
#qr-overlay.ok{background:rgba(0,25,15,0.93);}
#qr-overlay.already{background:rgba(30,18,0,0.93);}
#qr-overlay.ng{background:rgba(28,4,8,0.93);}

/* ★ 区分表示（年長幼児 / 一般）を大きく */
.ov-category{
  font-size:clamp(52px,16vw,88px);
  font-weight:700;
  letter-spacing:.05em;
  text-align:center;
  line-height:1.1;
  padding:12px 28px;
  border-radius:20px;
  margin-bottom:4px;
}
.ok .ov-category{
  color:#0d0f14;
  background:var(--accent);
  box-shadow:0 0 40px rgba(0,229,160,0.5);
}
.already .ov-category{
  color:#0d0f14;
  background:var(--warn);
  box-shadow:0 0 40px rgba(255,165,2,0.5);
}
.ng .ov-category{ display:none; }

.ov-icon{font-size:48px;line-height:1;}
.ov-label{font-size:14px;font-weight:700;letter-spacing:.1em;}
.ok .ov-label{color:var(--accent);}
.already .ov-label{color:var(--warn);}
.ng .ov-label{color:var(--danger);}
.ov-name{font-size:clamp(14px,3.5vw,22px);font-weight:700;color:rgba(255,255,255,0.75);text-align:center;word-break:break-all;line-height:1.45;}
.ov-sub{font-size:13px;color:rgba(255,255,255,.45);text-align:center;}
.ov-bar-wrap{width:min(280px,80vw);height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-top:8px;}
.ov-bar{height:100%;border-radius:99px;transform-origin:left;animation:shrink 5s linear forwards;}
.ok .ov-bar{background:var(--accent);}
.already .ov-bar{background:var(--warn);}
.ng .ov-bar{background:var(--danger);}
@keyframes shrink{from{transform:scaleX(1);}to{transform:scaleX(0);}}
.ov-tap{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px;}

#result-panel{flex-shrink:0;padding:10px 14px;display:none;}
.rc{border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.rc.ok{background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.35);}
.rc.already{background:rgba(255,165,2,.10);border:1px solid rgba(255,165,2,.35);}
.rc.ng{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.35);}
.rc.loading{background:var(--surface2);border:1px solid var(--border);}
.ri{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.ok .ri{background:rgba(0,229,160,.2);}
.already .ri{background:rgba(255,165,2,.2);}
.ng .ri{background:rgba(255,71,87,.2);}
.loading .ri{background:var(--surface);}
.rb{flex:1;min-width:0;}
.rl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px;}
.ok .rl{color:var(--accent);}
.already .rl{color:var(--warn);}
.ng .rl{color:var(--danger);}
.loading .rl{color:var(--text2);}
.rn{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rs{font-size:11px;color:var(--text2);margin-top:1px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#log-section{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);max-height:28vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.lh{padding:8px 14px 5px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);}
#clear-btn{font-size:11px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.ll{padding:2px 0 6px;}
.li{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.li:last-child{border-bottom:none;}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--accent);}.dal{background:var(--warn);}.dng{background:var(--danger);}
.ln{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.lt{font-size:10px;color:var(--text2);flex-shrink:0;}
.lb2{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;flex-shrink:0;}
.bok{background:rgba(0,229,160,.15);color:var(--accent);}
.bal{background:rgba(255,165,2,.15);color:var(--warn);}
.bng{background:rgba(255,71,87,.15);color:var(--danger);}
.le{padding:16px;font-size:13px;color:var(--text2);text-align:center;}
#cam-sw{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:7px 11px;color:#fff;font-size:12px;cursor:pointer;z-index:5;display:none;-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>
<header>
  <div class="logo">QR受付 <span>南山附属小</span></div>
  <div class="counter">本日 <b id="cnt">0</b> 件受付済</div>
</header>
<div id="camera-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="scan-canvas"></canvas>
  <div class="corners">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>
  </div>
  <div id="debug">カメラ起動待機中...</div>
  <button id="cam-sw">📷 切替</button>
  <div id="qr-overlay">
    <div class="ov-category" id="ov-category"></div>
    <div class="ov-icon" id="ov-icon"></div>
    <div class="ov-label" id="ov-label"></div>
    <div class="ov-name" id="ov-name"></div>
    <div class="ov-sub" id="ov-sub"></div>
    <div class="ov-bar-wrap"><div class="ov-bar" id="ov-bar"></div></div>
    <div class="ov-tap">タップで閉じる</div>
  </div>
  <div id="start-overlay">
    <div style="text-align:center">
      <div style="font-size:17px;font-weight:700;margin-bottom:8px;">QRコード受付スキャナー</div>
      <div style="font-size:13px;color:var(--text2);">カメラを起動してスキャンを開始します</div>
    </div>
    <button id="start-btn">カメラを起動する</button>
  </div>
</div>
<div id="result-panel"></div>
<div id="log-section">
  <div class="lh">読み取り履歴 <button id="clear-btn" onclick="clearLog()">クリア</button></div>
  <div class="ll" id="log-list"><div class="le">まだスキャンされていません</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const GAS='https://script.google.com/macros/s/AKfycbz3zYceXKGmq1178CB7TKka-WtKjBxHaL0VPfJVMpyWTd4inCfN31n4ew4c_oMW1eti/exec';
const video=document.getElementById('video'),canvas=document.getElementById('scan-canvas'),ctx=canvas.getContext('2d'),startOv=document.getElementById('start-overlay'),startBtn=document.getElementById('start-btn'),rPanel=document.getElementById('result-panel'),logList=document.getElementById('log-list'),cntEl=document.getElementById('cnt'),camSw=document.getElementById('cam-sw'),qrOv=document.getElementById('qr-overlay'),ovCategory=document.getElementById('ov-category'),ovIcon=document.getElementById('ov-icon'),ovLabel=document.getElementById('ov-label'),ovName=document.getElementById('ov-name'),ovSub=document.getElementById('ov-sub'),ovBar=document.getElementById('ov-bar'),dbg=document.getElementById('debug');

let scanning=false,lastCode='',lastTime=0,rTimer=null,oTimer=null,logItems=[],countOk=0,cameras=[],camIdx=0,stream=null,frameCount=0;

startBtn.addEventListener('click',async()=>{
  startBtn.disabled=true;startBtn.textContent='起動中…';
  try{await startCam();startOv.style.display='none';scanning=true;dbg.textContent='スキャン中... QRコードをかざしてください';requestAnimationFrame(tick);}
  catch(err){startBtn.disabled=false;startBtn.textContent='カメラを起動する';alert('カメラを起動できませんでした。\n'+err.message);}
});

async function startCam(){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(cameras.length===0){const devs=await navigator.mediaDevices.enumerateDevices();cameras=devs.filter(d=>d.kind==='videoinput');if(cameras.length>1)camSw.style.display='block';}
  const c={video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}};
  if(cameras.length>0&&cameras[camIdx])c.video.deviceId={exact:cameras[camIdx].deviceId};
  stream=await navigator.mediaDevices.getUserMedia(c);video.srcObject=stream;await video.play();
}

camSw.addEventListener('click',async()=>{camIdx=(camIdx+1)%cameras.length;try{await startCam();}catch(e){}});

function tick(){
  if(!scanning)return;
  frameCount++;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);
    const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data){
      const now=Date.now();
      dbg.textContent='読取: '+code.data.slice(0,40);
      if(code.data!==lastCode||now-lastTime>5000){lastCode=code.data;lastTime=now;handleScan(code.data);}
    }else{
      if(frameCount%30===0)dbg.textContent='スキャン中... '+canvas.width+'x'+canvas.height;
    }
  }else{dbg.textContent='ビデオ準備中... state='+video.readyState;}
  requestAnimationFrame(tick);
}

async function handleScan(qr){
  showCard('loading','照合中…',qr,'');
  try{
    const res=await fetch(GAS+'?action=check&qr='+encodeURIComponent(qr),{redirect:'follow'});
    const d=await res.json();
    handleResult(d,qr);
  }catch(err){
    showCard('ng','エラー','通信エラー','ネットワークを確認してください');
    addLog(qr,'ng','');lastCode='';
  }
}

function handleResult(d,qr){
  // GASから返るd.sheetが「年長幼児」または「一般」
  const sheet = d.sheet || '';
  if(d.status==='scanned'){
    countOk++;cntEl.textContent=countOk;
    showCard('ok','✓ 受付完了',qr,'A列に〇を記録しました');
    showOverlay('ok','✅','✓ 受付完了',qr,'A列に〇を記録しました', sheet);
    addLog(qr,'ok',sheet);vib([120]);
  }else if(d.status==='alreadyScanned'){
    showCard('already','⚠ 受付済み',qr,'すでに受付済みです');
    showOverlay('already','⚠️','⚠ 受付済み',qr,'すでに受付済みです', sheet);
    addLog(qr,'already',sheet);vib([60,60,60]);
  }else{
    showCard('ng','✗ 照合なし',qr,'リストに存在しません');
    showOverlay('ng','❌','✗ 照合なし',qr,'リストに存在しません','');
    addLog(qr,'ng','');vib([250]);
  }
}

function showCard(type,label,name,sub){
  if(rTimer)clearTimeout(rTimer);
  const ic={ok:'✓',already:'⚠',ng:'✗',loading:''};
  const ico=type==='loading'?'<div class="spinner"></div>':'<div style="font-size:18px">'+ic[type]+'</div>';
  rPanel.style.display='block';
  rPanel.innerHTML='<div class="rc '+type+'"><div class="ri">'+ico+'</div><div class="rb"><div class="rl">'+label+'</div><div class="rn">'+esc(name)+'</div>'+(sub?'<div class="rs">'+esc(sub)+'</div>':'')+'</div></div>';
  if(type!=='loading')rTimer=setTimeout(()=>{rPanel.style.display='none';lastCode='';},5000);
}

function showOverlay(type,icon,label,name,sub,category){
  if(oTimer)clearTimeout(oTimer);
  qrOv.className=type;qrOv.style.display='flex';
  // 区分（年長幼児/一般）を大きく表示
  ovCategory.textContent = category || '';
  ovIcon.textContent=icon;ovLabel.textContent=label;ovName.textContent=name;ovSub.textContent=sub;
  ovBar.style.animation='none';ovBar.offsetHeight;ovBar.style.animation='shrink 5s linear forwards';
  oTimer=setTimeout(()=>{qrOv.style.display='none';lastCode='';},5000);
}

qrOv.addEventListener('click',()=>{if(oTimer)clearTimeout(oTimer);qrOv.style.display='none';lastCode='';});

function addLog(qr,st,sheet){
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  logItems.unshift({qr,st,t,sheet});renderLog();
}

function renderLog(){
  if(!logItems.length){logList.innerHTML='<div class="le">まだスキャンされていません</div>';return;}
  const lb={ok:'一致',already:'済',ng:'不一致'},dc={ok:'dok',already:'dal',ng:'dng'},bc={ok:'bok',already:'bal',ng:'bng'};
  logList.innerHTML=logItems.map(i=>{
    const sheetLabel = i.sheet ? ' <span style="font-size:10px;color:var(--text2);">['+esc(i.sheet)+']</span>' : '';
    return '<div class="li"><div class="ld '+dc[i.st]+'"></div><div class="ln">'+esc(i.qr)+sheetLabel+'</div><div class="lt">'+i.t+'</div><div class="lb2 '+bc[i.st]+'">'+lb[i.st]+'</div></div>';
  }).join('');
}

function clearLog(){logItems=[];countOk=0;cntEl.textContent='0';renderLog();}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function vib(p){if(navigator.vibrate)navigator.vibrate(p);}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR受付システム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --accent: #00e5a0;
    --accent2: #00b87a;
    --danger: #ff4757;
    --warn: #ffa502;
    --text: #e8edf5;
    --text2: #8892a4;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── ヘッダー ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); font-weight: 400; }
  .counter {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }
  .counter b { color: var(--accent); }

  /* ── カメラエリア ── */
  #camera-wrap {
    position: relative;
    width: 100%;
    flex: 1 1 auto;
    overflow: hidden;
    background: #000;
    min-height: 0;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  canvas#scan-canvas { display: none; }

  /* スキャン枠 */
  .scan-ui {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: min(240px, 55vw);
    height: min(240px, 55vw);
    position: relative;
  }
  .scan-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }
  .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: var(--accent);
    border-style: solid;
  }
  .c-tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .c-tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .c-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .c-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .scan-line {
    position: absolute;
    left: 2px; right: 2px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0;
    animation: scanline 2s ease-in-out infinite;
    border-radius: 1px;
  }
  @keyframes scanline {
    0%   { top: 2px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: calc(100% - 4px); opacity: 0; }
  }
  .scan-hint {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    letter-spacing: .04em;
  }

  /* カメラ起動前のオーバーレイ */
  #start-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
  }
  .cam-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .cam-icon svg { width: 28px; height: 28px; fill: var(--accent); }
  #start-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 36px;
    cursor: pointer;
    letter-spacing: .04em;
  }
  #start-btn:active { opacity: .8; }

  /* ── 結果パネル ── */
  #result-panel {
    flex-shrink: 0;
    padding: 12px 16px;
    display: none;
  }
  .result-card {
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card.ok     { background: rgba(0,229,160,.12); border: 1px solid rgba(0,229,160,.35); }
  .result-card.already{ background: rgba(255,165, 2,.10); border: 1px solid rgba(255,165, 2,.35); }
  .result-card.ng     { background: rgba(255, 71,87,.12); border: 1px solid rgba(255, 71,87,.35); }
  .result-card.loading{ background: var(--surface2);      border: 1px solid var(--border); }

  .result-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }
  .ok .result-icon     { background: rgba(0,229,160,.2); }
  .already .result-icon{ background: rgba(255,165, 2,.2); }
  .ng .result-icon     { background: rgba(255, 71,87,.2); }
  .loading .result-icon{ background: var(--surface); }

  .result-body { flex: 1; min-width: 0; }
  .result-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .ok .result-label     { color: var(--accent); }
  .already .result-label{ color: var(--warn); }
  .ng .result-label     { color: var(--danger); }
  .loading .result-label{ color: var(--text2); }

  .result-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* ── 履歴 ── */
  #log-section {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    max-height: 36vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .log-header {
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }
  #clear-btn {
    font-size: 11px;
    color: var(--text2);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  #clear-btn:active { opacity: .6; }

  .log-list { padding: 4px 0 8px; }
  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background .15s;
  }
  .log-item:last-child { border-bottom: none; }
  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ok      { background: var(--accent); }
  .dot-already { background: var(--warn); }
  .dot-ng      { background: var(--danger); }

  .log-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .log-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .badge-ok      { background: rgba(0,229,160,.15); color: var(--accent); }
  .badge-already { background: rgba(255,165, 2,.15); color: var(--warn); }
  .badge-ng      { background: rgba(255, 71,87,.15); color: var(--danger); }

  .log-empty {
    padding: 20px 16px;
    font-size: 13px;
    color: var(--text2);
    text-align: center;
  }

  /* スピナー */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── QR読み取り結果 大表示オーバーレイ ── */
  #qr-overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
    padding: 24px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: fadeInOverlay .2s ease;
  }
  @keyframes fadeInOverlay {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  #qr-overlay.ok      { background: rgba(0, 30, 20, 0.88); }
  #qr-overlay.already { background: rgba(30, 20, 0, 0.88); }
  #qr-overlay.ng      { background: rgba(30, 5, 8, 0.88); }

  #qr-overlay .ov-status {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .ok .ov-status      { color: var(--accent); }
  .already .ov-status { color: var(--warn); }
  .ng .ov-status      { color: var(--danger); }

  #qr-overlay .ov-icon {
    font-size: 56px;
    line-height: 1;
  }

  #qr-overlay .ov-text {
    font-size: clamp(22px, 6vw, 36px);
    font-weight: 700;
    color: #fff;
    text-align: center;
    word-break: break-all;
    line-height: 1.4;
    max-width: 100%;
    text-shadow: 0 2px 16px rgba(0,0,0,.6);
  }

  #qr-overlay .ov-sub {
    font-size: 13px;
    color: rgba(255,255,255,.55);
    text-align: center;
  }

  #qr-overlay .ov-timer {
    margin-top: 8px;
    width: 100%;
    max-width: 260px;
    height: 3px;
    background: rgba(255,255,255,.15);
    border-radius: 99px;
    overflow: hidden;
  }
  #qr-overlay .ov-timer-bar {
    height: 100%;
    border-radius: 99px;
    width: 100%;
    transform-origin: left;
    animation: timerShrink 5s linear forwards;
  }
  .ok .ov-timer-bar      { background: var(--accent); }
  .already .ov-timer-bar { background: var(--warn); }
  .ng .ov-timer-bar      { background: var(--danger); }

  @keyframes timerShrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* カメラ切替ボタン */
  #cam-switch {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 10px;
    padding: 8px 12px;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    z-index: 5;
    display: none;
    backdrop-filter: blur(4px);
  }
  #cam-switch:active { opacity: .7; }
</style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div class="logo">QR受付 <span>南山附属小</span></div>
  <div class="counter">本日 <b id="count-ok">0</b> 件受付済</div>
</header>

<!-- カメラ -->
<div id="camera-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="scan-canvas"></canvas>

  <div class="scan-ui">
    <div class="scan-frame">
      <div class="corner c-tl"></div>
      <div class="corner c-tr"></div>
      <div class="corner c-bl"></div>
      <div class="corner c-br"></div>
      <div class="scan-line"></div>
      <div class="scan-hint">QRコードを枠内に合わせてください</div>
    </div>
  </div>

  <button id="cam-switch">📷 切替</button>

  <!-- QR読み取り大表示オーバーレイ -->
  <div id="qr-overlay">
    <div class="ov-status" id="ov-status"></div>
    <div class="ov-icon" id="ov-icon"></div>
    <div class="ov-text" id="ov-text"></div>
    <div class="ov-sub" id="ov-sub"></div>
    <div class="ov-timer"><div class="ov-timer-bar" id="ov-timer-bar"></div></div>
  </div>

  <div id="start-overlay">
    <div class="cam-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm0-2a5 5 0 1 1 0 10A5 5 0 0 1 12 7zm6.5-1H19l-2-2H7L5 6h-.5A2.5 2.5 0 0 0 2 8.5v9A2.5 2.5 0 0 0 4.5 20h15a2.5 2.5 0 0 0 2.5-2.5v-9A2.5 2.5 0 0 0 18.5 6z"/>
      </svg>
    </div>
    <div style="text-align:center">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">QRコード受付スキャナー</div>
      <div style="font-size:12px;color:var(--text2)">カメラを起動してスキャンを開始します</div>
    </div>
    <button id="start-btn">カメラを起動する</button>
  </div>
</div>

<!-- 結果 -->
<div id="result-panel"></div>

<!-- 履歴 -->
<div id="log-section">
  <div class="log-header">
    読み取り履歴
    <button id="clear-btn" onclick="clearLog()">クリア</button>
  </div>
  <div class="log-list" id="log-list">
    <div class="log-empty">まだスキャンされていません</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// ── 設定 ──────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwrHJl0Eb6GrlN8Snp46nW8AiWIg6yNMI2LGLS6yJL0eIIB6aIXX4TIWZ5JUVe_hW7G/exec';

// ── 状態 ──────────────────────────────────────────
let scanning = false;
let lastCode = '';
let lastTime = 0;
let resultTimer = null;
let logItems = [];
let countOk = 0;
let cameras = [];
let currentCamIdx = 0;
let stream = null;

const video      = document.getElementById('video');
const canvas     = document.getElementById('scan-canvas');
const ctx        = canvas.getContext('2d');
const overlay    = document.getElementById('start-overlay');
const startBtn   = document.getElementById('start-btn');
const resultPanel= document.getElementById('result-panel');
const logList    = document.getElementById('log-list');
const countEl    = document.getElementById('count-ok');
const camSwitch  = document.getElementById('cam-switch');

// ── カメラ起動 ─────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = '起動中…';
  try {
    await startCamera();
    overlay.style.display = 'none';
    scanning = true;
    requestAnimationFrame(tick);
  } catch(e) {
    startBtn.disabled = false;
    startBtn.textContent = 'カメラを起動する';
    alert('カメラを起動できませんでした。\nSafariの設定でカメラを許可してください。\n\n' + e.message);
  }
});

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  // カメラ一覧を取得（初回）
  if (cameras.length === 0) {
    const devices = await navigator.mediaDevices.enumerateDevices();
    cameras = devices.filter(d => d.kind === 'videoinput');
    if (cameras.length > 1) camSwitch.style.display = 'block';
  }
  const constraints = cameras.length > 0 && cameras[currentCamIdx]
    ? { video: { deviceId: { exact: cameras[currentCamIdx].deviceId }, facingMode: 'environment' } }
    : { video: { facingMode: { ideal: 'environment' } } };

  stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;
  await video.play();
}

camSwitch.addEventListener('click', async () => {
  if (cameras.length <= 1) return;
  currentCamIdx = (currentCamIdx + 1) % cameras.length;
  try { await startCamera(); } catch(e) { console.error(e); }
});

// ── スキャンループ ────────────────────────────────
function tick() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height);
    if (code && code.data) {
      const now = Date.now();
      if (code.data !== lastCode || now - lastTime > 4000) {
        lastCode = code.data;
        lastTime = now;
        handleScan(code.data);
      }
    }
  }
  requestAnimationFrame(tick);
}

// ── QR照合 ────────────────────────────────────────
async function handleScan(qr) {
  showResult('loading', '照合中…', qr, '');

  try {
    // GASはGETパラメータで受け取る形式（doPostが無い場合はdoGetで対応）
    // doPostを追加済みの場合はPOSTで送信
    const res = await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',   // GASはno-corsでPOST → レスpondはopaque
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ qr })
    });

    // no-corsのためレスポンスが読めない → GETでフォールバック照会
    // GETでステータスを取得する
    const getRes = await fetch(GAS_URL + '?action=check&qr=' + encodeURIComponent(qr));
    const data   = await getRes.json();

    handleResult(data, qr);

  } catch(e) {
    // no-cors POST後にGET確認ができない環境用フォールバック
    // POSTのみで完結（画面には「送信完了」と表示）
    showResult('ok', '送信完了', qr, 'スプレッドシートを確認してください');
    addLog(qr, 'ok');
  }
}

function handleResult(data, qr) {
  if (data.status === 'scanned') {
    countOk++;
    countEl.textContent = countOk;
    showResult('ok', '✓ 受付完了', qr, 'A列に〇を記録しました');
    showOverlay('ok', '✓ 受付完了', qr, 'A列に〇を記録しました');
    addLog(qr, 'ok');
    vibrate([100]);
  } else if (data.status === 'alreadyScanned') {
    showResult('already', '⚠ 受付済み', qr, 'すでに受付済みです');
    showOverlay('already', '⚠ 受付済み', qr, 'すでに受付済みです');
    addLog(qr, 'already');
    vibrate([50, 50, 50]);
  } else {
    showResult('ng', '✗ 照合なし', qr, 'リストに存在しません');
    showOverlay('ng', '✗ 照合なし', qr, 'リストに存在しません');
    addLog(qr, 'ng');
    vibrate([200]);
  }
}

// ── 結果表示 ──────────────────────────────────────
function showResult(type, label, name, sub) {
  if (resultTimer) clearTimeout(resultTimer);

  const icons = {
    ok:      '✓',
    already: '⚠',
    ng:      '✗',
    loading: ''
  };

  const spinnerHtml = type === 'loading'
    ? '<div class="spinner"></div>'
    : `<div style="font-size:20px">${icons[type]}</div>`;

  resultPanel.style.display = 'block';
  resultPanel.innerHTML = `
    <div class="result-card ${type}">
      <div class="result-icon">${spinnerHtml}</div>
      <div class="result-body">
        <div class="result-label">${label}</div>
        <div class="result-name">${escHtml(name)}</div>
        ${sub ? `<div class="result-sub">${escHtml(sub)}</div>` : ''}
      </div>
    </div>`;

  if (type !== 'loading') {
    resultTimer = setTimeout(() => {
      resultPanel.style.display = 'none';
      lastCode = '';
    }, 5000);
  }
}

// ── QR大表示オーバーレイ ──────────────────────────
let overlayTimer = null;
const qrOverlay  = document.getElementById('qr-overlay');
const ovStatus   = document.getElementById('ov-status');
const ovIcon     = document.getElementById('ov-icon');
const ovText     = document.getElementById('ov-text');
const ovSub      = document.getElementById('ov-sub');
const ovTimerBar = document.getElementById('ov-timer-bar');

const ovIcons = { ok: '✅', already: '⚠️', ng: '❌' };

function showOverlay(type, label, text, sub) {
  if (overlayTimer) clearTimeout(overlayTimer);
  qrOverlay.className = type;
  qrOverlay.style.display = 'flex';
  ovStatus.textContent = label;
  ovIcon.textContent   = ovIcons[type] || '';
  ovText.textContent   = text;
  ovSub.textContent    = sub;
  // タイマーバーのアニメーションをリセット
  ovTimerBar.style.animation = 'none';
  ovTimerBar.offsetHeight;   // reflow
  ovTimerBar.style.animation = 'timerShrink 5s linear forwards';
  overlayTimer = setTimeout(() => {
    qrOverlay.style.display = 'none';
    lastCode = '';
  }, 5000);
}

// タップで早閉じ
qrOverlay.addEventListener('click', () => {
  if (overlayTimer) clearTimeout(overlayTimer);
  qrOverlay.style.display = 'none';
  lastCode = '';
});

// ── 履歴 ──────────────────────────────────────────
function addLog(qr, status) {
  const now  = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  logItems.unshift({ qr, status, time });
  renderLog();
}

function renderLog() {
  if (logItems.length === 0) {
    logList.innerHTML = '<div class="log-empty">まだスキャンされていません</div>';
    return;
  }
  const labels  = { ok: '一致', already: '済', ng: '不一致' };
  logList.innerHTML = logItems.map(item => `
    <div class="log-item">
      <div class="log-dot dot-${item.status}"></div>
      <div class="log-name">${escHtml(item.qr)}</div>
      <div class="log-time">${item.time}</div>
      <div class="log-badge badge-${item.status}">${labels[item.status]}</div>
    </div>
  `).join('');
}

function clearLog() {
  logItems = [];
  countOk  = 0;
  countEl.textContent = '0';
  renderLog();
}

// ── ユーティリティ ────────────────────────────────
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
  );
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}
